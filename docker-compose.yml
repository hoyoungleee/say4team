# Docker Compose 파일 포맷의 버전을 지정합니다.
version: '3.8'
services:
  # MySQL 서비스 추가
  mysql:
    image: mysql:8.0 # 사용하고 있는 MySQL 이미지 버전 (최신 안정 버전 권장)
    container_name: mysql
    networks:
      - msa-network
    environment:
      # application.yml의 datasource 설정과 일치해야 합니다.
      MYSQL_ROOT_PASSWORD: mysql # MySQL root 비밀번호 (여기에 실제 비밀번호 입력!)
      MYSQL_DATABASE: say4team # DB 이름 (application.yml과 일치)
      MYSQL_USER: spring # application.yml의 사용자 이름과 일치
      MYSQL_PASSWORD: spring # application.yml의 비밀번호와 일치
    ports:
      - "3306:3306" # 호스트 포트:컨테이너 포트
    volumes:
      - db-data:/var/lib/mysql # 데이터 영속성을 위한 볼륨
    healthcheck: # MySQL 건강 상태 확인 (service_healthy 조건 사용을 위해 권장)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  config-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/config-service:latest
    container_name: config-service
    networks:
      - msa-network
    ports:
      - "8888:8888"
    # 만약 config-service에 environment와 env_file 설정이 있었다면 아래처럼 추가해야 합니다.
    # environment:
    #   - GITHUB_URL=${GITHUB_URL}
    #   - USERNAME=${GITHUB_USERNAME}
    #   - TOKEN=${GITHUB_TOKEN}
    # env_file:
    #   - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://config-service:8888/actuator/health" ]
      interval: 15s # 15초마다 한번씩 체크
      timeout: 5s  # 5초 안에 완료되어야 한다.
      retries: 3 # 3번까지 재시도 하기
      start_period: 30s # 컨테이너 시작 후 60초 동안은 health check 실패를 무시.
    restart: always # 컨테이너가 모종의 이유로 중지되면 무조건 재시작 시도.

  discovery-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/discovery-service:latest
    container_name: discovery-service
    networks:
      - msa-network
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://discovery-service:8761" ]
      interval: 15s # 15초마다 한번씩 체크
      timeout: 5s  # 5초 안에 완료되어야 한다.
      retries: 3 # 3번까지 재시도 하기
      start_period: 30s # 컨테이너 시작 후 60초 동안은 health check 실패를 무시.
    restart: always # 컨테이너가 모종의 이유로 중지되면 무조건 재시작 시도.

  gateway-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/gateway-service:latest
    container_name: gateway-service
    networks:
      - msa-network
    ports:
      - "8000:8000"
    depends_on:
      # gateway는 discovery와 config가 건강해야지만 컨테이너가 시작됩니다.
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    restart: always

  user-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/user-service:latest
    container_name: user-service
    networks:
      - msa-network
    depends_on:
      # gateway는 discovery와 config가 건강해야지만 컨테이너가 시작됩니다.
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      # 중요! MySQL이 먼저 건강해질 때까지 기다리도록 depends_on 추가 권장
      # mysql:
      #   condition: service_healthy
    restart: always

  ordering-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/ordering-service:latest
    container_name: order-service
    networks:
      - msa-network
    depends_on:
      # gateway는 discovery와 config가 건강해야지만 컨테이너가 시작됩니다.
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      # 중요! MySQL이 먼저 건강해질 때까지 기다리도록 depends_on 추가 권장
      # mysql:
      #   condition: service_healthy
      # redis: # Redis도 사용한다면depends_on 추가
      #   condition: service_started # Redis healthcheck가 없다면 service_started 사용
    restart: always

  product-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/product-service:latest
    container_name: product-service
    networks:
      - msa-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      # 중요! MySQL이 먼저 건강해질 때까지 기다리도록 depends_on 추가 권장
      # mysql:
      #   condition: service_healthy
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - msa-network

# 서비스들이 연결될 Docker 네트워크를 정의할 수 있습니다.
# 동일한 호스트 내에서 서로 통신할 수 있도록 해 주는 Docker의 네트워크 드라이버.
networks:
  msa-network:
    driver: bridge

volumes:
  db-data: # mysql 컨테이너가 사용하는 db-data 볼륨을 docker-compose도 기억해 줌.