# Docker Compose 파일 포맷의 버전을 지정합니다.
version: '3.8'
services:
  # MySQL 서비스 추가
  mysql:
    image: mysql:8.0 # 사용하고 있는 MySQL 이미지 버전 (최신 안정 버전 권장)
    container_name: mysql
    networks:
      - msa-network
    environment:
      # application.yml에 설정된 값과 일치해야 합니다.
      MYSQL_ROOT_PASSWORD: mysql # MySQL root 비밀번호 (여기에 실제 비밀번호 입력!)
      MYSQL_DATABASE: say4team # DB 이름 (application.yml과 일치)
      MYSQL_USER: spring # application.yml의 사용자 이름과 일치
      MYSQL_PASSWORD: spring # application.yml의 비밀번호와 일치
    ports:
      - "3306:3306" # 호스트 포트:컨테이너 포트
    volumes:
      - db-data:/var/lib/mysql # 데이터 영속성을 위한 볼륨
    healthcheck: # MySQL 건강 상태 확인 (service_healthy 조건 사용을 위해 권장)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  config-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/config-service:latest
    container_name: config-service
    networks:
      - msa-network
    ports:
      - "8888:8888"
    environment: # 기존 파일에서 가져온 환경 변수 정의
      - GITHUB_URL=${GITHUB_URL}
      - USERNAME=${GITHUB_USERNAME}
      - TOKEN=${GITHUB_TOKEN}
    env_file: # 기존 파일에서 가져온 .env 파일 로드
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://config-service:8888/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  discovery-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/discovery-service:latest
    container_name: discovery-service
    networks:
      - msa-network
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://discovery-service:8761" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  gateway-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/gateway-service:latest
    container_name: gateway-service
    networks:
      - msa-network
    ports:
      - "8000:8000"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    restart: always

  user-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/user-service:latest
    container_name: user-service
    networks:
      - msa-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      mysql: # <--- MySQL 의존성 추가 (mysql 서비스가 healthy할 때 시작)
        condition: service_healthy
    restart: always

  ordering-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/ordering-service:latest
    container_name: order-service
    networks:
      - msa-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      mysql: # <--- MySQL 의존성 추가
        condition: service_healthy
      redis: # <--- Redis 의존성 (만약 사용한다면, redis 서비스가 시작될 때 시작)
        condition: service_started
    restart: always

  product-service:
    image: 794038249902.dkr.ecr.ap-northeast-2.amazonaws.com/product-service:latest
    container_name: product-service
    networks:
      - msa-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      mysql: # <--- MySQL 의존성 추가
        condition: service_healthy
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - msa-network
    # Redis healthcheck (선택 사항이지만 권장, depends_on에 service_healthy를 사용할 수 있게 함)
    # healthcheck:
    #   test: ["CMD-SHELL", "redis-cli ping"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

# 서비스들이 연결될 Docker 네트워크를 정의할 수 있습니다.
networks:
  msa-network:
    driver: bridge

volumes:
  db-data: # mysql 컨테이너가 사용하는 db-data 볼륨을 docker-compose도 기억해 줌.